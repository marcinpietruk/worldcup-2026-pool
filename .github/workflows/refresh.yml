name: Live score refresh

# Pings the deployed app's /api/refresh on a fixed 5-minute cadence. The endpoint
# is "smart": it only calls the football API when a match is live or kicking off
# soon, so this is near-real-time during games and a free no-op otherwise.
#
# Activate by setting two repository secrets (Settings → Secrets and variables →
# Actions): APP_URL (e.g. https://your-app.vercel.app) and REFRESH_SECRET (must
# match the deployed env var).

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (GitHub's minimum)
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Avoid overlapping runs.
concurrency:
  group: live-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Ping refresh endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$REFRESH_SECRET" ]; then
            echo "APP_URL / REFRESH_SECRET secrets not set — skipping."
            exit 0
          fi
          code=$(curl -s -o /tmp/out -w "%{http_code}" "$APP_URL/api/refresh?secret=$REFRESH_SECRET")
          echo "HTTP $code"; cat /tmp/out; echo
          test "$code" = "200"
