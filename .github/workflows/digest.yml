name: Daily Slack digest

# Posts a morning digest (standings + movement, yesterday's results, today's
# fixtures, fun awards) to Slack once a day. The endpoint is "smart": on a day
# with no new results and no games it posts nothing.
#
# Requires the repository secrets APP_URL and REFRESH_SECRET (the same two the
# live-refresh workflow uses), plus SLACK_BOT_TOKEN and SLACK_CHANNEL_ID set in
# the Vercel project's environment variables.

on:
  schedule:
    # 04:27 UTC = 06:27 in Amsterdam during the tournament (CEST, UTC+2). Early
    # morning: by ~06:30 all of the previous day's North-American kickoffs have
    # finished and synced, so the digest reports a complete day of results.
    #
    # The odd minute (and the quiet pre-dawn-UTC hour) are deliberate: GitHub
    # only runs scheduled jobs on a best-effort basis and delays them under load.
    # The top of the hour at popular UTC times is the most contended slot, which
    # is why the old "0 8" routinely fired 2–4 h late. An off-the-hour minute in
    # a low-traffic window is dispatched far closer to on time (still not
    # guaranteed — switch to an external scheduler if it must be exact).
    - cron: "27 4 * * *"
  workflow_dispatch: # manual runs from the Actions tab
    inputs:
      force:
        description: "Post even with no new results / no games today (for testing)"
        type: boolean
        default: false
      selftest:
        description: "Ping the OpenAI commentary backend and report (no post)"
        type: boolean
        default: false

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Post daily digest
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$REFRESH_SECRET" ]; then
            echo "APP_URL / REFRESH_SECRET secrets not set — skipping."
            exit 0
          fi
          URL="$APP_URL/api/slack/digest?secret=$REFRESH_SECRET"
          if [ "${{ inputs.force }}" = "true" ]; then URL="$URL&force=1"; fi
          if [ "${{ inputs.selftest }}" = "true" ]; then URL="$URL&selftest=1"; fi
          code=$(curl -s -o /tmp/out -w "%{http_code}" "$URL")
          echo "HTTP $code"; cat /tmp/out; echo
          test "$code" = "200"
